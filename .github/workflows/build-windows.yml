name: Build & Release Windows

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Récupérer le code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Installer Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 3. Installer les dépendances Python
    - name: Install Python dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install -r APP/requirements.txt
        pip install pyinstaller

    # 4. Build EXE AUTONOME (PyInstaller ONEFILE)
    - name: Build EXE (PyInstaller onefile)
      shell: pwsh
      run: |
        pyinstaller `
          --onefile `
          --windowed `
          --clean `
          --name MyEnterpriseXMLApp `
          APP/src/main.py

    # 5. Test RÉEL de l'EXE (bloquant, remplace dumpbin)
    #    → si python311.dll est manquant, l'EXE quitte immédiatement ❌
    - name: Test EXE startup (no python DLL)
      shell: pwsh
      run: |
        Write-Host "Testing EXE startup..."

        if (!(Test-Path "dist\MyEnterpriseXMLApp.exe")) {
          Write-Host "::error ::EXE not found"
          exit 1
        }

        $process = Start-Process `
          -FilePath "dist\MyEnterpriseXMLApp.exe" `
          -PassThru `
          -WindowStyle Hidden

        Start-Sleep -Seconds 3

        if ($process.HasExited) {
          Write-Host "::error ::EXE exited immediately (likely missing python DLL)"
          exit 1
        }

        Stop-Process -Id $process.Id -Force
        Write-Host "✅ EXE started correctly (self-contained)"

    # 6. Construire la version PORTABLE (EXE unique)
    - name: Build Portable version
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force MyEnterpriseXMLApp_Portable
        Copy-Item dist\MyEnterpriseXMLApp.exe MyEnterpriseXMLApp_Portable\
        New-Item MyEnterpriseXMLApp_Portable\portable.flag -ItemType File

    # 7. ZIP de la version portable
    - name: Zip Portable version
      shell: pwsh
      run: |
        Compress-Archive `
          MyEnterpriseXMLApp_Portable `
          MyEnterpriseXMLApp_Portable_${{ github.ref_name }}.zip

    # 8. Installer WiX Toolset
    - name: Install WiX Toolset
      shell: pwsh
      run: |
        choco install wixtoolset --yes

    # 9. Build MSI (WiX – MSI monolithique)
    - name: Build MSI (WiX)
      shell: pwsh
      run: |
        candle -ext WixUIExtension `
               APP/packaging/wix/Product.wxs `
               APP/packaging/wix/Files.wxs

        light  -ext WixUIExtension `
               Product.wixobj `
               Files.wixobj `
               -o MyEnterpriseXMLApp_${{ github.ref_name }}.msi

    # 10. Publier la Release GitHub
    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: MyEnterpriseXMLApp ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        generate_release_notes: true
        files: |
          dist/MyEnterpriseXMLApp.exe
          MyEnterpriseXMLApp_${{ github.ref_name }}.msi
          MyEnterpriseXMLApp_Portable_${{ github.ref_name }}.zip
